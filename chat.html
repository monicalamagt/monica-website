<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Monica - Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="custom-cursor"></div>
    <div class="container chat-container">
        <header>
            <h1>Ask Me Anything</h1>
            <h2>about Monica Lama</h2>
        </header>
        <div class="chat-box" id="chatBox">
            <div class="message bot-message">
                <p>Hello! I can answer questions about Monica Lama. What would you like to know?</p>
            </div>
        </div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Type your question here..." autocomplete="off">
            <button id="sendButton">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="config.js"></script>
    <script src="chat.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
